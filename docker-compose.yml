services:
  barcode2homebox:
    # 公开镜像，来自 GitHub Container Registry，其他电脑可直接拉取部署（无需克隆/构建）
    image: ghcr.io/kiwiwiki007/barcode2homebox:latest
    pull_policy: always   # 强制每次 up 都拉取最新 latest，避免本地旧镜像不更新
    container_name: barcode2homebox
    restart: always
    environment:
      # ===== Homebox 连接（只需填 HOMEBOX_URL，其余均可不填）=====
      # 改成你的 Homebox 地址（内网示例 http://homebox:7745 / 公网示例 https://homebox.example.com:666）
      - HOMEBOX_URL=https://homebox.example.com:666
      # 会话 cookie 签名密钥；固定值可避免容器重启后用户被强制登出
      # 用 `python -c "import secrets;print(secrets.token_hex(32))"` 生成后填入
      - APP_SECRET=change-me-to-a-random-32byte-hex
      # 以下两项为可选覆盖（不填则用代码默认值：超时 30 秒、物品默认无位置）
      - HOMEBOX_LOCATION_ID=
      # Homebox 请求超时（秒）
      - HOMEBOX_TIMEOUT=30
      # ===== 商品数据源 =====
      # 腾讯云市场官方 GS1 接口（中国物品编码中心数据），国货/非食品兜底。
      # 购买地址：https://market.cloud.tencent.com/products/20577
      - GS1_API_URL=http://ap-guangzhou.cloudmarket-apigw.com/service-8lp6ruw0/getBarcode
      - GS1_SECRET_ID=
      - GS1_SECRET_KEY=
      # ===== AI 识图兜底（可选）=====
      # 完全查不到条码时，调用 OpenAI 兼容视觉接口识别包装图。
      - VISION_API_URL=
      - VISION_API_KEY=
      - VISION_MODEL=gpt-4o-mini
    ports:
      - 8000:8000
    # 后端通过 HOMEBOX_URL（公网或内网地址）连接 Homebox，无需额外网络配置。
    # 设置页填写的 GS1/Vision 配置持久化到此卷，容器重建不丢
    volumes:
      - ./data:/app/data
